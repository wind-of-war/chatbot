version: "3.9"

services:
  api:
    build:
      context: ..
      dockerfile: infra/docker/api.Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    volumes:
      - ../data:/app/data
    depends_on:
      - redis
      - qdrant

  worker:
    build:
      context: ..
      dockerfile: infra/docker/worker.Dockerfile
    env_file:
      - ../.env
    volumes:
      - ../data:/app/data
    depends_on:
      - redis
      - qdrant

  celery-beat:
    build:
      context: ..
      dockerfile: infra/docker/worker.Dockerfile
    command: ["celery", "-A", "apps.worker.celery_app.celery_app", "beat", "-l", "info"]
    env_file:
      - ../.env
    volumes:
      - ../data:/app/data
    depends_on:
      - redis

  telegram-bot:
    build:
      context: ..
      dockerfile: infra/docker/telegram-bot.Dockerfile
    env_file:
      - ../.env
    volumes:
      - ../data:/app/data
    depends_on:
      - api
      - redis
      - qdrant
    profiles: ["telegram-polling"]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  gateway:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api

volumes:
  qdrant_data:
